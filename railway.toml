# Railway deployment config for the bot8 FastAPI service.
# Reference: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
# Note the quoting: Railway needs the env-var expansion, so we wrap in sh -c
# and log startup so any import error shows up in Deploy Logs with a clear marker.
startCommand = "sh -c 'echo [bot8-api] starting on $PORT && exec uvicorn api.main:app --host 0.0.0.0 --port $PORT'"

# Health check needs time for pandas/pyarrow/duckdb imports on cold start.
# 90s is conservative but cheap — successful deploys respond in <3s.
healthcheckPath = "/health"
healthcheckTimeout = 90

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
