# Railway config for the bot8 Next.js frontend service.
# Lives in frontend/ so Railway picks it up when the service's
# Root Directory is set to `frontend`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
